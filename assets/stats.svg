<svg width="840" height="292" viewBox="0 0 840 292" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="292" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#06091c"/>
    </linearGradient>
    <linearGradient id="barL" x1="0" y1="0" x2="340" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8CFF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <linearGradient id="barR" x1="434" y1="0" x2="782" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B8CFF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="292" rx="10" fill="url(#bg)"/>
  <rect width="840" height="292" rx="10" fill="none" stroke="#5B8CFF" stroke-width="0.8" opacity="0.22"/>

  <!-- Top accent bar -->
  <rect y="0" width="840" height="2" rx="1" fill="#5B8CFF" filter="url(#softglow)"/>

  <!-- Corner brackets — TL -->
  <path d="M1 32 L1 1 L32 1" fill="none" stroke="#5B8CFF" stroke-width="1.8" filter="url(#glow)"/>
  <!-- TR -->
  <path d="M808 1 L839 1 L839 32" fill="none" stroke="#5B8CFF" stroke-width="1.8" filter="url(#glow)"/>
  <!-- BL -->
  <path d="M1 260 L1 291 L32 291" fill="none" stroke="#5B8CFF" stroke-width="1.8" filter="url(#glow)"/>
  <!-- BR -->
  <path d="M808 291 L839 291 L839 260" fill="none" stroke="#5B8CFF" stroke-width="1.8" filter="url(#glow)"/>

  <!-- Section label -->
  <text x="28" y="34" font-family="'Courier New',monospace" font-size="9" fill="#5B8CFF" letter-spacing="5" opacity="0.6">C H A R A C T E R   S T A T S</text>

  <!-- Name -->
  <text x="28" y="62" font-family="'Courier New',monospace" font-size="20" fill="#ffffff" font-weight="700" letter-spacing="1.5" filter="url(#softglow)">ANJALI_SAHU.exe</text>

  <!-- Class info -->
  <text x="28" y="80" font-family="'Courier New',monospace" font-size="10.5" fill="#7C4DFF" opacity="0.85">Full Stack Engineer  ·  SWE Intern @ AlgoUniversity  ·  Class: MERN + AI</text>

  <!-- Divider -->
