  <text x="434" y="204" font-family="'Courier New',monospace" font-size="11.5" fill="#c9d1d9">System Design</text>
  <text x="812" y="204" font-family="'Courier New',monospace" font-size="10" fill="#5B8CFF" text-anchor="end">68</text>
  <rect x="434" y="210" width="348" height="5" rx="2.5" fill="#5B8CFF" fill-opacity="0.1"/>
