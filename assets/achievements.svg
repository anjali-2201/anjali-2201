  <rect x="28" y="56" width="184" height="2" rx="1" fill="#5B8CFF" opacity="0.6"/>
  <text x="120" y="88" font-family="'Courier New',monospace" font-size="12" fill="#e6edf3" text-anchor="middle" font-weight="600">SWE Intern</text>
