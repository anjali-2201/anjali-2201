<svg width="840" height="320" viewBox="0 0 840 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="840" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#05081a"/>
    </linearGradient>
    <linearGradient id="tileU" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#5B8CFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7C4DFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="glow3" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sg3" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowTile" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="320" rx="10" fill="url(#bg3)"/>
  <rect width="840" height="320" rx="10" fill="none" stroke="#00E5FF" stroke-width="0.8" opacity="0.18"/>
  <rect y="0" width="840" height="2" rx="1" fill="#00E5FF" filter="url(#sg3)"/>

  <!-- Corner brackets — cyan theme -->
  <path d="M1 32 L1 1 L32 1" fill="none" stroke="#00E5FF" stroke-width="1.8" filter="url(#glow3)"/>
  <path d="M808 1 L839 1 L839 32" fill="none" stroke="#00E5FF" stroke-width="1.8" filter="url(#glow3)"/>
  <path d="M1 288 L1 319 L32 319" fill="none" stroke="#00E5FF" stroke-width="1.8" filter="url(#glow3)"/>
  <path d="M808 319 L839 319 L839 288" fill="none" stroke="#00E5FF" stroke-width="1.8" filter="url(#glow3)"/>

  <!-- Header -->
  <text x="28" y="34" font-family="'Courier New',monospace" font-size="9" fill="#00E5FF" letter-spacing="5" opacity="0.6">A C H I E V E M E N T   L O G</text>

  <!-- Divider -->
  <line x1="28" y1="46" x2="812" y2="46" stroke="#00E5FF" stroke-width="0.4" opacity="0.15"/>

