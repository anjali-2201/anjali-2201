    Layout: 4 columns, 3 rows
    Col x: 28, 228, 428, 628  (tile w=184, gap=16)
    Row y: 56, 148, 240        (tile h=76, gap=16)

    ROW 0 — All unlocked
    ROW 1 — 3 unlocked + 1 locked
    ROW 2 — All locked (3 items, last slot empty)
